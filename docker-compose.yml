services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: advertbench
      POSTGRES_PASSWORD: advertbench
      POSTGRES_DB: advertbench
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U advertbench -d advertbench"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
