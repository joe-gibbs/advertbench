<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}AdvertBench{% endblock %}</title>
    <meta name="description" content="Rank AI-generated image ad sets with Elo voting.">
    <link rel="stylesheet" href="/static/site.css?v=20260621-2">
  </head>
  <body>
    <header class="siteHeader">
      <a class="brand" href="/">
        <span>
          <strong>AdvertBench</strong>
        </span>
      </a>
      <nav class="siteNav" aria-label="Primary navigation">
        <a class="{{ 'active' if active_path == '/' else '' }}" href="/">Vote</a>
        <a class="{{ 'active' if active_path == '/leaderboard' else '' }}" href="/leaderboard">Leaderboard</a>
        <a class="{{ 'active' if active_path == '/about' else '' }}" href="/about">About</a>
      </nav>
    </header>

    {% block content %}{% endblock %}

    <footer class="siteFooter">
      created by <a href="https://jgibbs.dev" target="_blank" rel="noreferrer">Joe Gibbs</a>
      · <a href="https://github.com/joe-gibbs/advertbench" target="_blank" rel="noreferrer">GitHub</a>
    </footer>
  </body>
</html>
